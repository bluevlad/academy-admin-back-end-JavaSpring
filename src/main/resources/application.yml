server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /admin
  forward-headers-strategy: framework

# Define log path to prevent "Could not resolve placeholder 'log.path'" error
log:
  path: /app/logs

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/acm_basic?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  # type-aliases-package removed to avoid collision with full classnames in XML and duplicate classes
  configuration:
    map-underscore-to-camel-case: true

app:
  # Google OAuth 관리자 허용 이메일 (쉼표 구분). 기본값 rainend00@gmail.com
  super-admin-emails: ${SUPER_ADMIN_EMAILS:rainend00@gmail.com}
  admin:
    # 폼 로그인 관리자 계정. 운영환경에서는 반드시 환경변수로 덮어쓸 것
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:dnflskfk}

logging:
  level:
    com.academy: DEBUG
    org.springframework.web: INFO
