version: '3.8'

services:
  academy-service:
    build: .
    container_name: academy-admin-back-end
    ports:
      - "9001:9001"
    environment:
      - SERVER_PORT=9001
      - DB_URL=${DB_URL:-jdbc:mysql://host.docker.internal:3306/acm_basic?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SUPER_ADMIN_EMAILS=${SUPER_ADMIN_EMAILS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
